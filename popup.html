<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="vendor/quill.snow.css">
    <link rel="stylesheet" href="notes/notes.css">
    <link rel="stylesheet" href="password-manager/password_manager.css">
    <link rel="stylesheet" href="settings/settings.css">
    <link rel="stylesheet" href="secret-keys/secret_keys.css">
</head>

<body>

    <!-- Top Level App Switcher -->
    <div id="app-switcher">
        <button class="switcher-btn" data-app="notes">Ideas</button>
        <button class="switcher-btn" data-app="passwords">Passwords</button>
        <button class="switcher-btn" data-app="secret-keys">Secret Keys</button>
        <button id="theme-toggle" class="switcher-btn icon-only" title="Toggle theme">
            <!-- Sun icon -->
            <svg class="sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <!-- Moon icon -->
            <svg class="moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <button id="open-window-btn" class="switcher-btn icon-only" title="Open in new window">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
        </button>
        <button class="switcher-btn icon-only" data-app="settings" title="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </div>

    <!-- Dynamic Content Container — populated by router -->
    <div id="app-container">
        <!-- HTML fragments are loaded here by core/router.js -->
    </div>

    <!-- Shared Modal Backdrop -->
    <div id="modal-backdrop" class="hidden"></div>

    <!-- Vendor Libraries -->
    <script src="vendor/quill.min.js"></script>
    <script src="vendor/jszip.min.js"></script>

    <!-- Core Shared Modules -->
    <script src="core/db.js"></script>
    <script src="core/utils.js"></script>
    <script src="core/components.js"></script>

    <!-- Feature Modules (crypto & vault needed before PM) -->
    <script src="password-manager/crypto.js"></script>
    <script src="password-manager/vault.js"></script>

    <!-- Feature Application Logic -->
    <script src="notes/notes.js"></script>
    <script src="password-manager/password_manager.js"></script>
    <script src="core/env.js"></script>
    <script src="core/sync.js"></script>
    <script src="settings/settings.js"></script>
    <script src="secret-keys/secret_keys.js"></script>

    <!-- Router (must load last — initializes everything) -->
    <script src="core/router.js"></script>

</body>

</html>
