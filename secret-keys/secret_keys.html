<!-- Secret Keys Module — HTML Fragment (loaded by router) -->

<!-- Locked State Screen (Reused visual style from PM) -->
<div id="sk-locked-view" class="pm-state-view active">
    <div class="pm-login-card">
        <svg class="pm-lock-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
            </polygon>
        </svg>
        <h2 id="sk-login-title">Unlock Vault</h2>
        <p id="sk-login-subtitle">Enter your master password</p>

        <div class="pm-input-group">
            <input type="password" id="sk-master-password" placeholder="Master Password"
                autocomplete="new-password" data-lpignore="true" data-1p-ignore="true">
        </div>

        <p id="sk-login-error" class="error-msg hidden"></p>
        <button id="sk-unlock-btn" class="pm-primary-btn">Unlock</button>

        <div id="sk-setup-footer" class="hidden">
            <p class="pm-warning-text">Make sure you remember this password. If lost, your data cannot be
                recovered.</p>
        </div>
    </div>
</div>

<!-- Unlocked State Screen -->
<div id="sk-unlocked-view" class="pm-state-view hidden">
    <!-- SK Sidebar -->
    <aside id="sk-sidebar">
        <div class="pm-sidebar-header">
            <h3>Collections</h3>
        </div>
        <ul id="sk-category-list" class="sk-folder-list-container">
            <!-- System categories injected here -->
        </ul>
        <div class="sidebar-header mt-20">
            <h3>Folders</h3>
            <button id="sk-add-category-btn" class="icon-btn" title="Add new folder"><svg
                    xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14" />
                    <path d="M12 5v14" />
                </svg></button>
        </div>
        <ul id="sk-folder-list">
            <!-- Custom folders injected here -->
        </ul>
        <div class="sidebar-footer">
            <input type="file" id="sk-import-file" accept=".json" class="hidden">
            <div class="io-btn-group">
                <div class="io-dropdown-wrapper">
                    <button id="sk-import-btn" class="io-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Import
                    </button>
                    <div class="io-dropdown" id="sk-import-dropdown">
                        <button class="io-dropdown-item" data-action="sk-import-json">
                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            JSON
                        </button>
                    </div>
                </div>
                <div class="io-dropdown-wrapper">
                    <button id="sk-export-btn" class="io-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Export
                    </button>
                    <div class="io-dropdown" id="sk-export-dropdown">
                        <button class="io-dropdown-item" data-action="sk-export-json">
                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            JSON
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- SK Main Content -->
    <main id="sk-main-content">
        <header id="sk-top-bar">
            <div id="sk-search-container" class="search-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="sk-search-box" class="search-input" placeholder="Search your secrets...">
                <button id="sk-search-clear" class="search-clear-btn" title="Clear search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
        </header>

        <h2 id="sk-current-category-title">All Secrets</h2>

        <div id="sk-list-scroll-container">
            <div id="sk-entries-list">
                <!-- Secrets injected here -->
            </div>
        </div>
    </main>

    <!-- Floating FAB -->
    <button id="sk-add-entry-fab" title="Add new secret key">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14" />
            <path d="M5 12h14" />
        </svg>
    </button>
</div>

<!-- Add Secret Slide-over Panel -->
<div id="sk-detail-panel" class="pm-slide-panel hidden">
    <div class="pm-panel-header">
        <h3 id="sk-panel-title">Add Secret</h3>
        <div class="pm-panel-actions">
            <button id="sk-save-entry-btn" class="pm-primary-btn sk-save-btn">Save</button>
            <button id="sk-close-panel-btn" class="icon-btn"><svg xmlns="http://www.w3.org/2000/svg"
                    width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg></button>
        </div>
    </div>
    <!-- Panel Content injected dynamically -->
    <div class="pm-panel-content" id="sk-panel-content-area">
    </div>
</div>
