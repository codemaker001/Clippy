<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Personal Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../popup.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body data-theme="dark">

    <!-- Access Denied State -->
    <div id="admin-denied" class="admin-denied hidden">
        <div class="admin-denied-card">
            <svg class="admin-denied-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <h2>Access Denied</h2>
            <p>You don't have admin access. Contact the extension administrator.</p>
            <button id="admin-denied-close" class="admin-btn-secondary">Close</button>
        </div>
    </div>

    <!-- Loading State -->
    <div id="admin-loading" class="admin-loading">
        <div class="admin-spinner-lg"></div>
        <p>Verifying admin access...</p>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="admin-dashboard hidden">
        <!-- Header -->
        <div class="admin-header">
            <div class="admin-header-left">
                <h1 class="admin-title">📊 Admin Dashboard</h1>
                <p class="admin-subtitle">Personal Dashboard — User Management</p>
            </div>
            <div class="admin-header-right">
                <button id="admin-refresh-btn" class="admin-btn-primary" title="Refresh">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    Refresh
                </button>
                <button id="admin-export-btn" class="admin-btn-secondary" title="Export CSV">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export CSV
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="admin-stats">
            <div class="admin-stat-card">
                <div class="admin-stat-icon stat-total">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <div class="admin-stat-data">
                    <span id="stat-total-users" class="admin-stat-number">0</span>
                    <span class="admin-stat-label">Total Users</span>
                </div>
            </div>
            <div class="admin-stat-card">
                <div class="admin-stat-icon stat-premium">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>
                <div class="admin-stat-data">
                    <span id="stat-premium-users" class="admin-stat-number">0</span>
                    <span class="admin-stat-label">Premium</span>
                </div>
            </div>
            <div class="admin-stat-card">
                <div class="admin-stat-icon stat-active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                </div>
                <div class="admin-stat-data">
                    <span id="stat-active-today" class="admin-stat-number">0</span>
                    <span class="admin-stat-label">Active (24h)</span>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="admin-toolbar">
            <div class="admin-search-wrapper">
                <svg class="admin-search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input id="admin-search" type="text" placeholder="Search users..." class="admin-search-input">
            </div>
            <select id="admin-filter" class="admin-filter-select">
                <option value="all">All Users</option>
                <option value="premium">Premium Only</option>
                <option value="free">Free Only</option>
            </select>
        </div>

        <!-- Users Table -->
        <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Registered</th>
                        <th>Last Synced</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-users-tbody">
                    <!-- Rows added by JS -->
                </tbody>
            </table>
            <div id="admin-empty" class="admin-empty hidden">
                <p>No users found.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../core/db.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../password-manager/crypto.js"></script>
    <script src="../password-manager/vault.js"></script>
    <script src="../core/env.js"></script>
    <script src="../core/sync.js"></script>
    <script src="admin.js"></script>

</body>

</html>
